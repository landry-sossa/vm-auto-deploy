# ============================================================
# hosts.yml — Inventory Ansible
# Projet  : proxmox-auto-deploy
# Les IPs sont passées dynamiquement par le pipeline
# En local on les renseigne manuellement pour les tests
# ============================================================

all:
  vars:
    # Connexion SSH — clé privée générée pour Packer
    ansible_user:                 packer
    ansible_ssh_private_key_file: ~/.ssh/packer_id_rsa
    ansible_ssh_common_args:      "-o StrictHostKeyChecking=no"
    ansible_python_interpreter:   /usr/bin/python3

  children:

    # Groupe des VMs déployées par Terraform
    debian_vms:
      hosts:
        debian-vm-01:
          ansible_host: 10.10.0.20   # remplace par ton IP réelle